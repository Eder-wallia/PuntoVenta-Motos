<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mc { fill: #1a1a1a; }
      .mc-light { fill: #3a3a3a; }
      .mc-silver { fill: #888; }
      @media (prefers-color-scheme: dark) {
        .mc { fill: #e8e8e8; }
        .mc-light { fill: #c0c0c0; }
        .mc-silver { fill: #aaa; }
      }
    </style>
  </defs>

  <!-- Gato hidráulico (izquierda) -->
  <g class="mc">
    <rect x="100" y="490" width="160" height="14" rx="4"/>
    <circle cx="122" cy="512" r="14" fill="none" stroke="#1a1a1a" stroke-width="5" style="fill:none"/>
    <circle cx="122" cy="512" r="5"/>
    <circle cx="238" cy="512" r="14" fill="none" stroke="#1a1a1a" stroke-width="5" style="fill:none"/>
    <circle cx="238" cy="512" r="5"/>
    <rect x="140" y="420" width="12" height="75" rx="3"/>
    <rect x="105" y="450" width="75" height="10" rx="3"/>
    <rect x="200" y="390" width="10" height="105" rx="3"/>
    <rect x="145" y="415" width="70" height="10" rx="3" transform="rotate(-25 180 420)"/>
    <rect x="130" y="370" width="80" height="18" rx="4"/>
    <rect x="148" y="355" width="44" height="18" rx="3"/>
    <circle cx="170" cy="440" r="8"/>
    <circle cx="210" cy="435" r="7"/>
  </g>

  <!-- Llave inglesa (atrás, diagonal) -->
  <g class="mc-light" transform="rotate(-35 340 340)">
    <rect x="295" y="170" width="22" height="200" rx="5"/>
    <rect x="278" y="155" width="56" height="35" rx="6"/>
    <rect x="283" y="148" width="18" height="18" rx="3"/>
    <rect x="315" y="148" width="18" height="18" rx="3"/>
    <rect x="278" y="370" width="56" height="28" rx="5"/>
    <rect x="285" y="396" width="16" height="14" rx="2"/>
    <rect x="311" y="396" width="16" height="14" rx="2"/>
  </g>

  <!-- Aceitera (centro) -->
  <g class="mc">
    <ellipse cx="340" cy="420" rx="55" ry="65"/>
    <ellipse cx="325" cy="395" rx="18" ry="28" class="mc-light"/>
    <rect x="325" y="355" width="30" height="45" rx="8"/>
    <path d="M340 355 Q380 320 410 295 Q425 285 430 270" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <path d="M430 270 Q428 285 422 292 Q436 292 434 278 Z"/>
    <path d="M295 420 Q260 390 265 350 Q270 315 300 310" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
    <ellipse cx="340" cy="482" rx="55" ry="10"/>
  </g>

  <!-- Scanner OBD (derecha) -->
  <g class="mc">
    <rect x="460" y="300" width="140" height="190" rx="14"/>
    <rect x="472" y="318" width="116" height="80" rx="6" fill="white"/>
    <rect x="490" y="330" width="80" height="40" rx="5" fill="#ccc"/>
    <rect x="498" y="334" width="64" height="28" rx="3" fill="#aaa"/>
    <circle cx="504" cy="368" r="6" fill="#888"/>
    <circle cx="556" cy="368" r="6" fill="#888"/>
    <polyline points="487,385 500,375 510,382 522,370 534,378 546,368 558,374" fill="none" stroke="#444" stroke-width="3"/>
    <circle cx="490" cy="415" r="10"/>
    <rect x="508" y="407" width="44" height="14" rx="4" fill="#555"/>
    <circle cx="570" cy="415" r="10"/>
    <rect x="510" y="488" width="40" height="18" rx="4"/>
    <rect x="520" y="504" width="20" height="30" rx="3"/>
    <path d="M530 534 Q530 560 510 575 Q490 590 480 580" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <rect x="598" y="360" width="8" height="30" rx="4"/>
  </g>

  <!-- Letras M&C -->
  <text x="342" y="510" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#555" opacity="0.3" transform="translate(3,4)">M&amp;C</text>
  <text x="342" y="510" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#1a1a1a">M&amp;C</text>
  <text x="342" y="510" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="none" stroke="#888" stroke-width="1.5">M&amp;C</text>

</svg>
